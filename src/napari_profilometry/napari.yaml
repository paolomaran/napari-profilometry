name: napari-profilometry
display_name: Profilometry processor
# use 'hidden' to remove plugin from napari hub search results
visibility: hidden
# see https://napari.org/stable/plugins/technical_references/manifest.html#fields for valid categories
# categories: []
contributions:
  commands:
    - id: napari-profilometry.make_reshape_widget
      python_name: napari_profilometry._profilometry_widget:reshape_stack_widget
      title: Make reshape stack widget
    - id: napari-profilometry.make_wrapped_phase_widget
      python_name: napari_profilometry._profilometry_widget:get_wrapped_phase_widget
      title: Make extract wrapped phase widget
    - id: napari-profilometry.make_unwrap_single_image_widget
      python_name: napari_profilometry._profilometry_widget:unwrap_single_image_widget
      title: Make unwrap single image widget
    - id: napari-profilometry.make_unwrap_stack_widget
      python_name: napari_profilometry._profilometry_widget:unwrap_stack_widget
      title: Make unwrap stack widget
  widgets:
    - display_name: Reshape stack
      command: napari_profilometry._profilometry_widget.reshape_stack_widget
    - display_name: Extract wrapped phase
      command: napari_profilometry._profilometry_widget.get_wrapped_phase_widget
    - display_name: Unwrap single image
      command: napari_profilometry._profilometry_widget.unwrap_single_image_widget
    - display_name: Unwrap stack
      command: napari_profilometry._profilometry_widget.unwrap_stack_widget
